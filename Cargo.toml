[package]
name = "p2ptun"
version = "0.1.0"
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
actix-web = "4"
tokio = "1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
futures = "0.3"
lazy_static = "1"
webrtc = "0.8"
bytes = "1"
pub-sub = "2"
uuid = { version = "1", features = ["v4"] }
clap = { version = "4", features = ["derive"] }
env_logger = "0.10"
log = "0.4"
tun-tap = "0.1.4"
