<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>p2ptun</title>
    <link rel="stylesheet" href="/webui/style.css" />
  </head>
  <body>
    <h1>p2ptun</h1>
    <form action="javascript:void(0);">
      <fieldset>
        <h2>Offer</h2>
        <button id="create-offer">Create offer</button>
        <output id="offer-out">...</output>
        <input type="text" id="answer-in" />
        <button id="accept-connection">Accept connection</button>
      </fieldset>
      <fieldset>
        <h2>Answer</h2>
        <input type="text" id="offer-in" />
        <button id="create-answer">Create answer</button>
        <output id="answer-out">...</output>
      </fieldset>
      <fieldset>
        <h2>Peers</h2>
        <ul id="peers"></ul>
      </fieldset>
    </form>
    <script>
      const offerOut = document.getElementById("offer-out");
      const offerIn = document.getElementById("offer-in");
      const answerOut = document.getElementById("answer-out");
      const answerIn = document.getElementById("answer-in");
      const createOffer = document.getElementById("create-offer");
      const createAnswer = document.getElementById("create-answer");
      const acceptConnection = document.getElementById("accept-connection");
      const peersView = document.getElementById("peers");
      createOffer.addEventListener("click", async () => {
        const offer = await fetch("/call/offer");
        if (offer.status === 200) {
          offerOut.innerText = await offer.text();
        }
      });
      createAnswer.addEventListener("click", async () => {
        const answer = await fetch("/call/answer", {
          method: "POST",
          body: offerIn.value,
        });
        if (answer.status === 200) {
          answerOut.innerText = await answer.text();
          offerIn.value = "";
        }
      });
      acceptConnection.addEventListener("click", async () => {
        const accept = await fetch("/call/accept", {
          method: "POST",
          body: answerIn.value,
        });
        if (accept.status === 200) {
          answerIn.value = "";
          offerOut.innerText = "...";
        }
      });
      setInterval(async () => {
        const peers = await fetch("/peers");
        if (peers.status === 200) {
          const peersJson = await peers.json();
          peersView.replaceChildren(peersJson.map(peer => {
            const el = document.createElement("li");
            el.innerText = JSON.stringify(peer);
            return el;
          }));
        }
      }, 300);
    </script>
  </body>
</html>
